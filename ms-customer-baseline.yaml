multinode: false
modelArtifacts:
  uri: "hf://openai/gpt-oss-20b"
  name: "openai/gpt-oss-20b"
  size: 50Gi
  authSecretName: "llm-d-hf-token"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "customer-models"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"
    llm-d.ai/model: "gpt-oss-20b"
routing:
  proxy:
    enabled: false
    targetPort: 8000
accelerator:
  type: nvidia
decode:
  create: true
  parallelism:
    tensor: 4
    data: 1
  replicas: 4
  containers:
    - name: "vllm"
      image: vllm/vllm-openai:v0.18.0
      modelCommand: vllmServe
      args:
        - "--disable-uvicorn-access-log"
        - "--gpu-memory-utilization=0.9"
        - "--enable-prefix-caching"
        - "--max-model-len=8192"
      env:
        - name: VLLM_MXFP4_USE_MARLIN
          value: "1"
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
      resources:
        limits:
          cpu: '32'
          memory: 200Gi
        requests:
          cpu: '32'
          memory: 200Gi
      mountModelVolume: true
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 120
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 20Gi
    - name: torch-compile-cache
      emptyDir: {}
prefill:
  create: false
